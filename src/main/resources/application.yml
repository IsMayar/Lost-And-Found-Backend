server:
  port: 8085

spring:
  application:
    name: findly-api

  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5435/findly_db
    username: findly_user
    password: findly_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:5174
      - http://localhost:3000

jwt:
  secret: "findly-local-development-secret-key-change-this-in-production-please-make-it-long"
  access-token-expiration-minutes: 30
  refresh-token-expiration-days: 7

upload:
  local-dir: uploads
  public-path: /uploads
